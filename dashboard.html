<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAI — Control Center</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050508;
  --bg1:#0c0d13;
  --bg2:#12141d;
  --bg3:#181b26;
  --border:#1e2235;
  --border2:#252a3d;
  --a:#4f6ef7;
  --a2:#7c3aed;
  --g:#00c97a;
  --r:#f7384f;
  --y:#f5a623;
  --text:#e8ebf4;
  --muted:#5a6080;
  --sans:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);}

body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(79,110,247,.08) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(124,58,237,.07) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.wrap{max-width:1440px;margin:0 auto;padding:28px 32px;position:relative;z-index:1;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;}
.hlogo{display:flex;align-items:center;gap:14px;}
.hlogo-mark{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--a),var(--a2));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:17px;color:#fff;letter-spacing:-1px;
  box-shadow:0 0 24px rgba(79,110,247,.35);
}
.hlogo h1{font-size:18px;font-weight:600;letter-spacing:-.3px;}
.hlogo h1 em{font-style:normal;color:var(--a);}
.hlogo p{font-size:12px;color:var(--muted);margin-top:1px;}

.hright{display:flex;align-items:center;gap:20px;}
.clock{font-family:var(--mono);font-size:13px;color:var(--muted);}
.wsbar{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
.wsdot{width:7px;height:7px;border-radius:50%;background:var(--r);transition:.3s;}
.wsdot.on{background:var(--g);box-shadow:0 0 8px var(--g);}

/* ── STATS ROW ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat{
  background:var(--bg1);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;position:relative;overflow:hidden;
  transition:border-color .2s;
}
.stat:hover{border-color:var(--border2);}
.stat::after{
  content:'';position:absolute;top:0;right:0;width:60px;height:60px;
  border-radius:0 14px 0 60px;opacity:.06;
}
.stat.blue::after{background:var(--a);}
.stat.purple::after{background:var(--a2);}
.stat.green::after{background:var(--g);}
.stat.amber::after{background:var(--y);}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-1px;font-family:var(--mono);}
.stat-val.blue{color:var(--a);}
.stat-val.green{color:var(--g);}
.stat-val.amber{color:var(--y);}
.stat-val.purple{color:var(--a2);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:6px;}

/* ── GLOBAL ACTIONS ── */
.gactions{display:flex;align-items:center;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.gactions-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-right:6px;}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border:none;border-radius:8px;cursor:pointer;
  font-family:var(--sans);font-size:12px;font-weight:600;
  letter-spacing:.3px;transition:all .18s;white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
.btn:active{transform:translateY(0) scale(.98);}
.btn-primary{background:var(--a);color:#fff;box-shadow:0 4px 14px rgba(79,110,247,.3);}
.btn-danger{background:var(--r);color:#fff;box-shadow:0 4px 14px rgba(247,56,79,.25);}
.btn-ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border2);}
.btn-sm{padding:6px 13px;font-size:11px;}
.btn-icon{width:30px;height:30px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:14px;}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;margin-bottom:28px;}

/* ── GROUP CARD ── */
.card{
  background:var(--bg1);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;transition:border-color .2s,transform .2s;
}
.card:hover{border-color:rgba(79,110,247,.25);transform:translateY(-2px);}

.card-head{
  padding:16px 20px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:15px;font-weight:600;}
.card-ip{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:3px;}

.card-body{padding:18px 20px;}

/* Services */
.services{display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.srow{display:flex;align-items:center;justify-content:space-between;}
.sinfo{display:flex;align-items:center;gap:10px;}
.sdot{
  width:8px;height:8px;border-radius:50%;background:var(--muted);
  flex-shrink:0;transition:all .3s;
}
.sdot.running{background:var(--g);box-shadow:0 0 8px rgba(0,201,122,.5);animation:breathing 2.5s ease-in-out infinite;}
.sdot.stopped{background:var(--r);}
.sdot.error{background:var(--y);}
.sdot.unknown{background:var(--muted);animation:blinking 1.8s ease-in-out infinite;}
@keyframes breathing{0%,100%{box-shadow:0 0 4px rgba(0,201,122,.3);}50%{box-shadow:0 0 12px rgba(0,201,122,.7);}}
@keyframes blinking{0%,100%{opacity:1;}50%{opacity:.3;}}

.sname{font-size:12px;}
.sbadge{
  font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 9px;border-radius:20px;
}
.sbadge.running{background:rgba(0,201,122,.12);color:var(--g);}
.sbadge.stopped{background:rgba(247,56,79,.12);color:var(--r);}
.sbadge.unknown{background:rgba(90,96,128,.15);color:var(--muted);}
.sbadge.error{background:rgba(245,166,35,.12);color:var(--y);}
.sctrl{display:flex;gap:5px;margin-left:10px;}

.divider{height:1px;background:var(--border);margin:14px 0;}

/* Triggers */
.trg-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:10px;}
.trg-btns{display:flex;gap:7px;flex-wrap:wrap;}
.trgbtn{
  padding:6px 14px;border:1px solid var(--border2);background:var(--bg3);
  color:var(--text);border-radius:8px;font-family:var(--sans);font-size:11px;
  font-weight:500;cursor:pointer;transition:all .18s;
}
.trgbtn:hover{transform:translateY(-1px);}
.trgbtn.cog:hover{background:rgba(79,110,247,.2);border-color:var(--a);color:var(--a);}
.trgbtn.meta:hover{background:rgba(124,58,237,.2);border-color:var(--a2);color:#a78bfa;}
.trgbtn.soc:hover{background:rgba(0,201,122,.15);border-color:var(--g);color:var(--g);}
.trgbtn.aff:hover{background:rgba(245,166,35,.15);border-color:var(--y);color:var(--y);}

.card-foot{
  padding:12px 20px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-foot-actions{display:flex;gap:6px;}

/* ── LOGS PANEL ── */
.logs-panel{
  background:var(--bg1);border:1px solid var(--border);border-radius:16px;overflow:hidden;
}
.logs-head{
  padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.logs-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;}
.logs-ping{
  width:6px;height:6px;border-radius:50%;background:var(--g);
  box-shadow:0 0 6px var(--g);animation:breathing 2s ease-in-out infinite;
}
.tabs{display:flex;gap:4px;flex-wrap:wrap;}
.tab{
  padding:4px 13px;border-radius:6px;font-size:11px;cursor:pointer;
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  font-family:var(--sans);transition:.18s;
}
.tab.active{background:var(--a);color:#fff;border-color:var(--a);box-shadow:0 0 10px rgba(79,110,247,.25);}
.tab:hover:not(.active){border-color:var(--a);color:var(--a);}

.logs-body{
  height:280px;overflow-y:auto;padding:14px 20px;
  font-family:var(--mono);font-size:11px;line-height:1.9;
}
.logs-body::-webkit-scrollbar{width:3px;}
.logs-body::-webkit-scrollbar-track{background:transparent;}
.logs-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.logline{display:flex;gap:14px;padding:1px 0;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
.lt{color:var(--muted);flex-shrink:0;}
.lm{word-break:break-all;}
.lm.ok{color:var(--g);}
.lm.err{color:var(--r);}
.lm.warn{color:var(--y);}
.lm.inf{color:var(--a);}
.lm.muted{color:var(--muted);}
.nologs{color:var(--muted);font-size:12px;text-align:center;padding:50px 0;font-family:var(--sans);}

/* ── TOAST ── */
.toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999;}
.toast{
  padding:10px 16px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:10px;font-size:12px;font-family:var(--sans);
  animation:sin .25s ease;max-width:300px;
}
.toast.ok{border-color:rgba(0,201,122,.4);color:var(--g);}
.toast.err{border-color:rgba(247,56,79,.4);color:var(--r);}
@keyframes sin{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes sout{from{transform:translateX(0);opacity:1;}to{transform:translateX(110%);opacity:0;}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="hlogo">
    <div class="hlogo-mark">M2</div>
    <div>
      <h1>MAI <em>Control</em> Center</h1>
      <p>Multi-group session monitoring &amp; control</p>
    </div>
  </div>
  <div class="hright">
    <div class="clock" id="clock">--:--:--</div>
    <div class="wsbar">
      <div class="wsdot" id="wsdot"></div>
      <span id="wstxt">Connecting…</span>
    </div>
  </div>
</header>

<div class="stats">
  <div class="stat blue">
    <div class="stat-label">Active Groups</div>
    <div class="stat-val blue" id="stat-active">0</div>
    <div class="stat-sub">of 4 configured</div>
  </div>
  <div class="stat green">
    <div class="stat-label">Services Running</div>
    <div class="stat-val green" id="stat-services">0</div>
    <div class="stat-sub">server.py + MAI agents</div>
  </div>
  <div class="stat purple">
    <div class="stat-label">Triggers Fired</div>
    <div class="stat-val purple" id="stat-triggers">0</div>
    <div class="stat-sub">this session</div>
  </div>
  <div class="stat amber">
    <div class="stat-label">Errors</div>
    <div class="stat-val amber" id="stat-errors">0</div>
    <div class="stat-sub">in activity log</div>
  </div>
</div>

<div class="gactions">
  <span class="gactions-label">All Groups</span>
  <button class="btn btn-primary" onclick="startAll()">▶ Start All</button>
  <button class="btn btn-danger" onclick="stopAll()">■ Stop All</button>
  <button class="btn btn-ghost" onclick="refreshAll()">↻ Refresh</button>
</div>

<div class="grid" id="grid"></div>

<div class="logs-panel">
  <div class="logs-head">
    <div class="logs-title"><div class="logs-ping"></div> Activity Log</div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="tabs" id="tabs"></div>
      <button class="btn btn-ghost btn-sm" onclick="clearLogs()">Clear</button>
    </div>
  </div>
  <div class="logs-body" id="logbody">
    <div class="nologs">No activity yet — start a group to see live logs.</div>
  </div>
</div>

</div>
<div class="toasts" id="toasts"></div>

<script>
const GROUPS=[
  {id:'group1',name:'Group 1',ip:'86.50.170.225'},
  {id:'group2',name:'Group 2',ip:'128.214.254.204'},
  {id:'group3',name:'Group 3',ip:'128.214.255.139'},
  {id:'group4',name:'Group 4',ip:'86.50.168.55'},
];
const TRIGGERS=[
  {id:'COGNITIVE',label:'Cognitive',cls:'cog'},
  {id:'METACOGNITIVE',label:'Metacognitive',cls:'meta'},
  {id:'SOCIAL',label:'Social',cls:'soc'},
  {id:'AFFECTIVE',label:'Affective',cls:'aff'},
];

let ws,activeTab='all',logs=[],gLogs={},triggerCount=0,errorCount=0;
GROUPS.forEach(g=>gLogs[g.id]=[]);

function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('en-GB');
  setTimeout(tick,1000);
}tick();

function connect(){
  ws=new WebSocket('ws://localhost:8765/ws');
  ws.onopen=()=>{
    const d=document.getElementById('wsdot'),t=document.getElementById('wstxt');
    d.classList.add('on');t.textContent='Connected';
    toast('Dashboard connected','ok');
  };
  ws.onclose=()=>{
    const d=document.getElementById('wsdot'),t=document.getElementById('wstxt');
    d.classList.remove('on');t.textContent='Reconnecting…';
    setTimeout(connect,3000);
  };
  ws.onmessage=e=>{
    try{const m=JSON.parse(e.data);handle(m);}catch(_){}
  };
}

function handle(m){
  if(m.type==='status')updateStatus(m.group_id,m.status);
  else if(m.type==='log')addLog(m.group_id,m.message,'inf');
  else if(m.type==='logs')addLog(m.group_id,m.logs,'muted');
  else if(m.type==='error'){addLog(null,m.message,'err');toast(m.message,'err');}
}

function updateStatus(gid,s){
  const svc={docker:s.docker,server_py:s.server_py,mai_agent:s.mai_agent};
  Object.entries(svc).forEach(([k,v])=>{
    const dot=document.getElementById(`dot-${gid}-${k}`);
    const badge=document.getElementById(`badge-${gid}-${k}`);
    if(dot){dot.className=`sdot ${v||'unknown'}`;}
    if(badge){badge.className=`sbadge ${v||'unknown'}`;badge.textContent=v||'unknown';}
  });
  if(s.last_log)addLog(gid,s.last_log,'muted');
  updateStats();
}

function updateStats(){
  let active=0,services=0;
  GROUPS.forEach(g=>{
    const sp=document.getElementById(`badge-${g.id}-server_py`);
    const ma=document.getElementById(`badge-${g.id}-mai_agent`);
    const dk=document.getElementById(`badge-${g.id}-docker`);
    const spR=sp&&sp.textContent==='running';
    const maR=ma&&ma.textContent==='running';
    const dkR=dk&&dk.textContent==='running';
    if(spR||maR)active++;
    if(spR)services++;
    if(maR)services++;
  });
  document.getElementById('stat-active').textContent=active;
  document.getElementById('stat-services').textContent=services;
  document.getElementById('stat-triggers').textContent=triggerCount;
  document.getElementById('stat-errors').textContent=errorCount;
}

function addLog(gid,msg,type){
  const now=new Date().toLocaleTimeString('en-GB');
  const e={t:now,m:msg,type,gid};
  logs.unshift(e);
  if(gid)gLogs[gid]?.unshift(e);
  if(logs.length>800)logs.pop();
  if(type==='err')errorCount++;
  renderLogs();
  updateStats();
}

function renderLogs(){
  const src=activeTab==='all'?logs:(gLogs[activeTab]||[]);
  const el=document.getElementById('logbody');
  if(!src.length){el.innerHTML='<div class="nologs">No activity yet.</div>';return;}
  el.innerHTML=src.slice(0,120).map(e=>{
    const cls=e.m?.includes('✅')?'ok':e.m?.includes('❌')?'err':e.type;
    return`<div class="logline"><span class="lt">${e.t}</span><span class="lm ${cls}">${esc(e.m||'')}</span></div>`;
  }).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function send(d){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));
  else toast('Not connected','err');
}

function startAll(){GROUPS.forEach(g=>send({action:'start_all',group_id:g.id}));toast('Starting all groups…','ok');}
function stopAll(){GROUPS.forEach(g=>send({action:'stop_all',group_id:g.id}));toast('Stopping all groups…','err');}
function refreshAll(){toast('Refreshing status…','ok');}
function clearLogs(){logs=[];GROUPS.forEach(g=>gLogs[g.id]=[]);errorCount=0;renderLogs();updateStats();}

function switchTab(id,el){
  activeTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderLogs();
}

function triggerFired(gid,type){
  triggerCount++;
  addLog(gid,`Triggered: ${type}`,'ok');
  send({action:'trigger',group_id:gid,trigger_type:type});
  toast(`${type} → ${gid}`,'ok');
  updateStats();
}

function buildUI(){
  const grid=document.getElementById('grid');
  const tabs=document.getElementById('tabs');

  tabs.innerHTML=`<button class="tab active" onclick="switchTab('all',this)">All</button>`;
  GROUPS.forEach(g=>{
    tabs.innerHTML+=`<button class="tab" onclick="switchTab('${g.id}',this)">${g.name}</button>`;
  });

  grid.innerHTML=GROUPS.map(g=>`
  <div class="card" id="card-${g.id}">
    <div class="card-head">
      <div>
        <div class="card-title">${g.name}</div>
        <div class="card-ip">${g.ip}:8080</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary btn-sm" onclick="send({action:'start_all',group_id:'${g.id}'})">▶ Start</button>
        <button class="btn btn-danger btn-sm" onclick="send({action:'stop_all',group_id:'${g.id}'})">■ Stop</button>
      </div>
    </div>
    <div class="card-body">
      <div class="services">
        ${svcRow(g.id,'docker','Bazaar Docker','start_docker','stop_docker')}
        ${svcRow(g.id,'server_py','server.py — Whisper','start_server','stop_server')}
        ${svcRow(g.id,'mai_agent','MAI Agent — Java','start_agent','stop_agent')}
      </div>
      <div class="divider"></div>
      <div class="trg-label">Manual Triggers</div>
      <div class="trg-btns">
        ${TRIGGERS.map(t=>`<button class="trgbtn ${t.cls}" onclick="triggerFired('${g.id}','${t.id}')">${t.label}</button>`).join('')}
      </div>
    </div>
    <div class="card-foot">
      <div style="font-size:11px;color:var(--muted);" id="cardstatus-${g.id}">Idle</div>
      <div class="card-foot-actions">
        <button class="btn btn-ghost btn-sm" onclick="send({action:'get_logs',group_id:'${g.id}'});switchTab('${g.id}',document.querySelectorAll('.tab')[${GROUPS.indexOf(g)+1}])">📋 Logs</button>
      </div>
    </div>
  </div>`).join('');
}

function svcRow(gid,key,label,startA,stopA){
  return`<div class="srow">
    <div class="sinfo">
      <div class="sdot unknown" id="dot-${gid}-${key}"></div>
      <span class="sname">${label}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="sbadge unknown" id="badge-${gid}-${key}">unknown</span>
      <div class="sctrl">
        <button class="btn btn-ghost btn-icon btn-sm" onclick="send({action:'${startA}',group_id:'${gid}'})" title="Start">▶</button>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="send({action:'${stopA}',group_id:'${gid}'})" title="Stop">■</button>
      </div>
    </div>
  </div>`;
}

function toast(msg,type='ok'){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;c.appendChild(el);
  setTimeout(()=>{el.style.animation='sout .25s ease forwards';setTimeout(()=>el.remove(),250);},3000);
}

buildUI();
connect();
</script>
</body>
</html>
